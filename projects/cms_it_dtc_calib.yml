shortdescription: Writing SW for the IT-DTC system that runs on [APOLLO board](https://arxiv.org/abs/2501.03702) board.
description: >
  The [APOLLO platform](https://arxiv.org/abs/2501.03702) will be used as the Inner Tracker Data Trigger and Control system (IT-DTC) and the Level-1 track trigger finder
  for the CMS Phase-II upgrade at the HL-LHC. This project involves developing and testing the IT-DTC plugin SW,
  which is part of the Online Software for the Tracker upgrade, with the main focus on the detector calibration routines.

  The student will join the SW development effort by working on calibrations of the Front-End modules.
  This involves active collaboration with the system's HW, FW and SW developers and will greatly contribute to student's experience
  and understanding of the detector operation and readout systems. Depending on the project duration and general development progress,
  this project can be extended to participation in the deployment and tests of the IT-DTC plugin.

